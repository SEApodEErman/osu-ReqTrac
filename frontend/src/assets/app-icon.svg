<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">osu!ReqTrac app icon</title>
  <desc id="desc">A white R on an osu! pink rounded square.</desc>
  <defs>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff72b2"/>
      <stop offset="1" stop-color="#ff4fa0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#ff4fa0" flood-opacity=".28"/>
    </filter>
  </defs>
  <rect x="48" y="48" width="416" height="416" rx="96" fill="url(#pink)" filter="url(#shadow)"/>
  <text x="256" y="350" text-anchor="middle" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="284" font-weight="700">R</text>
</svg>
