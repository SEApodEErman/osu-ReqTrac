name: Suggestion
description: Suggest an improvement or new feature for osu!ReqTrac
title: "[Suggestion]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve osu!ReqTrac. Please describe the need behind your suggestion and how you would like it to work.

  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I have searched the existing issues and could not find a duplicate.
          required: true

  - type: textarea
    id: summary
    attributes:
      label: Short summary
      description: Provide a brief overview of your suggestion.
      placeholder: What would you like to see added or changed, and what would this improve/what problem would it fix?
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: Write down specific details about how you would like osu!ReqTrac to implement your suggestion. Use a numbered list if you have multiple steps or ideas.
      placeholder: 1. Explain what you would like osu!ReqTrac to do.
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: References
      description: Add anything else that may help, such as screenshots, relevant osu! beatmap links, examples, alternatives considered, or context.
      placeholder: Anything else we should know?